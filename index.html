<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Rates Flow</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
            <h2>Currency Rates Flow</h2>
            <form>
                <div class="amount padding">
                <p>Enter Amount</p>
                <input value="1" type="text">
                </div>
                
                <div class="exchange padding">
                    <div class="dropdown">
                        <p>From</p>
                        <div class="left">
                            <img src="https://flagsapi.com/US/flat/64.png">
                            <select id="from"name="from">
                                <option value="USD">USD</option>
                                <option value="INR">INR</option>
                                <optin value="EUR">EUR</optin>
                                <option value="AUD">AUD</option>
                            </select>
                        </div>
                    </div>

                    <i id="icon" class="fa-solid fa-arrow-right-arrow-left"></i>
                    
                    <div class="dropdown">
                        <p>To</p>
                        <div class="right">
                            <img src="https://flagsapi.com/IN/flat/64.png">
                            <select id="to" name="to">
                                <option value="USD">USD</option>
                                <option value="INR">INR</option>
                                <optin value="EUR">EUR</optin>
                                <option value="AUD">AUD</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="board padding">
                    <p>1USD = 80INR</p>
                </div>

                <button class="padding">Get Exchange Rate</button>
            </form>
    </div>

    <script src="codes.js"></script>
    <script src="script.js"></script>
</body>
</html>
